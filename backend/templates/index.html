{% load vite_assets %}
<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyHomeBro - Secure Escrow Payments</title>

    <!-- ✅ In production, WhiteNoise serves these at /static/... -->
    <link rel="icon" type="image/png" href="/static/favicon-192x192.png" />
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png" sizes="180x180" />
    <link rel="mask-icon" href="/static/masked-icon.svg" color="#1E3A8A" />

    <!-- CSP: keep same-origin assets & API calls; fonts allowed -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data:;
      connect-src 'self' ws: wss:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    " />
    <script type="module" crossorigin src="{% vite_entry_js %}"></script>
    {% vite_entry_css as vite_css_href %}
    {% if vite_css_href %}
    <link rel="stylesheet" crossorigin href="{{ vite_css_href }}">
    {% endif %}
  </head>
  <body>
    <div id="root" aria-live="polite"></div>
    <!-- Legacy template kept in sync via Vite manifest resolution. -->
  </body>
</html>
